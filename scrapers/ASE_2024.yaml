# Template for creating a new scraper
# Usage: python run_yaml.py scrapers/ASE_2024.yaml

name: "Journal of the American Society of Echocardiography (ASE) 2024"
date: "2024-01-01"

listing:
  url_template: "https://www.sciencedirect.com/journal/journal-of-the-american-society-of-echocardiography/vol/37/issue/{page}"
  start_page: 1
  end_page: 12
  page_increment: 1
  urls: []
  item_selector: "a.article-content-title"
  allow_manual_clearance: true
  fail_on_access_block: true

scraping:
  request_delay_min: 2.5
  request_delay_max: 6.0
  post_nav_jitter: 3.0
  allow_manual_clearance: true
  fail_on_access_block: true
  indicator_xpath: '//*[@id="screen-reader-main-title"]'
  fields:
    title: '//*[@id="screen-reader-main-title"]'
    authors: "#author-group .author"
    abstract: "#abstracts"
    doi: "a.doi"
    date: ".text-xs"

chrome:
  version: 147
  user_data_dir: "chrome_profile_ashok"

output: "ASE_2024_data.json"
